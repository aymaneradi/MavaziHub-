spring:
  application:
    name: mavazihub-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mavazihub
    username: mavazihub_user
    password: mavazihub_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

security:
  jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000