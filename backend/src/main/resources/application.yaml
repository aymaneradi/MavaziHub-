spring:
  application:
    name: mavazihub-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mavazihub
    username: mavazihub_user
    password: mavazihub_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 4

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 900000
      refresh-token-expiration: 604800000

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE